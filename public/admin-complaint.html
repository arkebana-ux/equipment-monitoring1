<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карточка обращения</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="complaint-page">
  <header class="topbar topbar-modern">
    <div class="topbar-left">
      <button id="backBtn" class="back-link" type="button">← Назад к панели</button>
      <h1 id="complaintTitle">Карточка обращения</h1>
    </div>
    <button id="logoutBtn" class="btn" type="button">Выйти</button>
  </header>

  <main class="tabs-container">
    <section class="card wide">
      <div class="pane-header">
        <div>
          <p class="eyebrow">Обращение</p>
          <h2>Основная информация</h2>
        </div>
      </div>
      <div id="complaintDetails"></div>
    </section>

    <section class="room-layout complaint-layout">
      <div class="card wide">
        <div class="pane-header">
          <div>
            <p class="eyebrow">Статус и ответственный</p>
            <h2>Управление заявкой</h2>
          </div>
        </div>
        <form id="complaintManageForm" class="form-vertical">
          <label>
            Статус заявки
            <select id="complaintStatusSelect" name="status">
              <option value="на рассмотрении">На рассмотрении</option>
              <option value="в ремонте">В ремонте</option>
              <option value="исправлено">Исправлено</option>
            </select>
          </label>
          <label>
            Ответственный администратор
            <select id="assignedAdminSelect" name="admin_id"></select>
          </label>
          <button class="btn hover-highlight" type="submit">Сохранить изменения</button>
        </form>
      </div>

      <div class="card wide">
        <div class="pane-header">
          <div>
            <p class="eyebrow">Комментарии</p>
            <h2>Рабочие заметки</h2>
          </div>
        </div>
        <form id="commentForm">
          <label>
            Новый комментарий
            <textarea id="commentInput" name="comment" placeholder="Например: согласовали время проверки оборудования"></textarea>
          </label>
          <button class="btn hover-highlight" type="submit">Добавить комментарий</button>
        </form>
        <div id="commentsList" class="room-analytics-list"></div>
      </div>
    </section>

    <section class="card wide">
      <div class="pane-header">
        <div>
          <p class="eyebrow">История</p>
          <h2>История изменений</h2>
        </div>
      </div>
      <div id="historyList" class="room-analytics-list"></div>
    </section>

    <section class="card wide">
      <div class="pane-header">
        <div>
          <p class="eyebrow">Вложения</p>
          <h2>Прикрепленные файлы</h2>
        </div>
      </div>
      <div id="attachments" class="attachments-grid"></div>
    </section>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function requestJSON(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      return { ok: response.ok, data };
    }

    function showToast(message, type = 'success', title = 'Готово') {
      const toastContainer = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<p class="toast-title">${escapeHtml(title)}</p><p class="toast-message">${escapeHtml(message)}</p>`;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3200);
    }

    function statusBadge(status) {
      const value = String(status || '').toLowerCase();
      if (value === 'на рассмотрении') return '<span class="status-badge status-review-badge">На рассмотрении</span>';
      if (value === 'в ремонте') return '<span class="status-badge status-repair-badge">В ремонте</span>';
      if (value === 'исправлено') return '<span class="status-badge status-fixed-badge">Исправлено</span>';
      return `<span class="status-badge">${escapeHtml(status || 'Без статуса')}</span>`;
    }

    function queryParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function humanizeAction(actionType) {
      const map = {
        created: 'Создана заявка',
        status_changed: 'Изменен статус',
        assignee_changed: 'Назначен ответственный',
        comment_added: 'Добавлен комментарий'
      };
      return map[actionType] || actionType;
    }

    let initialized = false;

    async function loadComplaint() {
      const id = queryParam('id');
      if (!id) return;

      const { ok, data } = await requestJSON(`/admin/complaints/${id}`);
      if (!ok) {
        document.getElementById('complaintDetails').textContent = data.message || 'Не удалось загрузить заявку';
        return;
      }

      const complaint = data.complaint;
      const complaintHeading = complaint.room_name && complaint.equipment_name
        ? `Аудитория ${complaint.room_name} • ${complaint.equipment_name}`
        : (complaint.equipment_name || complaint.room_name || 'Карточка обращения');

      document.getElementById('complaintTitle').textContent = complaintHeading;
      document.title = complaintHeading;

      document.getElementById('complaintDetails').innerHTML = `
        <div class="room-analytics-list">
          <div class="room-analytics-item">
            <div class="room-analytics-top">
              <div class="room-analytics-name">${escapeHtml(complaint.room_name ? `Аудитория ${complaint.room_name}` : 'Без аудитории')}</div>
              <div class="room-analytics-meta">${statusBadge(complaint.status)}</div>
            </div>
            <div class="complaint-info-grid">
              <div class="complaint-info-card">
                <span class="complaint-info-label">Номер обращения</span>
                <span class="complaint-info-value">#${escapeHtml(complaint.id)}</span>
              </div>
              <div class="complaint-info-card">
                <span class="complaint-info-label">Преподаватель</span>
                <span class="complaint-info-value">${escapeHtml(complaint.full_name || complaint.login || '-')}</span>
              </div>
              <div class="complaint-info-card">
                <span class="complaint-info-label">Оборудование</span>
                <span class="complaint-info-value">${escapeHtml(complaint.equipment_name || '-')}</span>
              </div>
              <div class="complaint-info-card">
                <span class="complaint-info-label">Серийный номер</span>
                <span class="complaint-info-value">${escapeHtml(complaint.serial_number || 'Не указан')}</span>
              </div>
              <div class="complaint-info-card">
                <span class="complaint-info-label">Ответственный</span>
                <span class="complaint-info-value">${escapeHtml(complaint.assigned_admin_name || 'Не назначен')}</span>
              </div>
            </div>
            <p>${escapeHtml(complaint.description || '-')}</p>
            <p class="hint">Создано: ${escapeHtml(complaint.created_at || '-')} | Обновлено: ${escapeHtml(complaint.updated_at || '-')}</p>
          </div>
        </div>
      `;

      const adminSelect = document.getElementById('assignedAdminSelect');
      adminSelect.innerHTML = '<option value="">Не назначен</option>' + (data.admins || []).map((admin) => `
        <option value="${admin.id}" ${Number(admin.id) === Number(complaint.assigned_admin_id) ? 'selected' : ''}>
          ${escapeHtml(admin.full_name)} (${escapeHtml(admin.login)})
        </option>
      `).join('');

      document.getElementById('complaintStatusSelect').value = complaint.status || 'на рассмотрении';

      const commentsList = document.getElementById('commentsList');
      commentsList.innerHTML = (data.comments || []).length
        ? data.comments.map((comment) => `
          <div class="room-analytics-item">
            <div class="room-analytics-top">
              <div class="room-analytics-name">${escapeHtml(comment.full_name || comment.login || 'Пользователь')}</div>
              <div class="room-analytics-meta">${escapeHtml(comment.created_at)}</div>
            </div>
            <p>${escapeHtml(comment.comment)}</p>
          </div>
        `).join('')
        : '<div class="empty-state"><h3>Комментариев пока нет</h3><p>Добавьте первый рабочий комментарий по этой заявке.</p></div>';

      const historyList = document.getElementById('historyList');
      historyList.innerHTML = (data.history || []).length
        ? data.history.map((entry) => `
          <div class="room-analytics-item">
            <div class="room-analytics-top">
              <div class="room-analytics-name">${escapeHtml(humanizeAction(entry.action_type))}</div>
              <div class="room-analytics-meta">${escapeHtml(entry.created_at)}</div>
            </div>
            <p>${escapeHtml(entry.comment || 'Изменение сохранено в журнале заявки.')}</p>
            <p class="hint">
              ${entry.full_name ? `Исполнитель: ${escapeHtml(entry.full_name)}. ` : ''}
              ${entry.old_value ? `Было: ${escapeHtml(entry.old_value)}. ` : ''}
              ${entry.new_value ? `Стало: ${escapeHtml(entry.new_value)}.` : ''}
            </p>
          </div>
        `).join('')
        : '<div class="empty-state"><h3>История пока пустая</h3><p>Изменения по заявке будут отображаться здесь.</p></div>';

      const attachments = document.getElementById('attachments');
      attachments.innerHTML = '';
      (data.attachments || []).forEach((filePath) => {
        const fileName = String(filePath).toLowerCase();
        if (/\.(jpg|jpeg|png|gif|webp)$/.test(fileName)) {
          const img = document.createElement('img');
          img.src = filePath;
          img.className = 'attachment-img';
          attachments.appendChild(img);
        } else if (/\.(mp4|webm|ogg)$/.test(fileName)) {
          const video = document.createElement('video');
          video.src = filePath;
          video.controls = true;
          video.className = 'attachment-video';
          attachments.appendChild(video);
        } else {
          const link = document.createElement('a');
          link.href = filePath;
          link.textContent = filePath.split('/').pop();
          attachments.appendChild(link);
        }
      });

      if (!attachments.children.length) {
        attachments.innerHTML = '<div class="empty-state"><h3>Вложений нет</h3><p>Пользователь не прикреплял файлы к этой заявке.</p></div>';
      }
    }

    document.getElementById('complaintManageForm').onsubmit = async (event) => {
      event.preventDefault();
      const id = queryParam('id');
      const status = document.getElementById('complaintStatusSelect').value;
      const admin_id = document.getElementById('assignedAdminSelect').value;

      const statusResponse = await requestJSON(`/admin/complaints/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (!statusResponse.ok) {
        return showToast(statusResponse.data.message || 'Не удалось сохранить статус', 'error', 'Ошибка');
      }

      const assignResponse = await requestJSON(`/admin/complaints/${id}/assign`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_id: admin_id || null })
      });
      if (!assignResponse.ok) {
        return showToast(assignResponse.data.message || 'Не удалось сохранить ответственного', 'error', 'Ошибка');
      }

      showToast('Изменения по заявке сохранены');
      await loadComplaint();
    };

    document.getElementById('commentForm').onsubmit = async (event) => {
      event.preventDefault();
      const id = queryParam('id');
      const commentInput = document.getElementById('commentInput');
      const comment = commentInput.value.trim();
      if (!comment) return;

      const { ok, data } = await requestJSON(`/admin/complaints/${id}/comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ comment })
      });
      if (!ok) return showToast(data.message || 'Не удалось добавить комментарий', 'error', 'Ошибка');

      commentInput.value = '';
      showToast('Комментарий добавлен');
      await loadComplaint();
    };

    document.getElementById('backBtn').onclick = () => {
      const lastTab = sessionStorage.getItem('adminLastTab') || 'errors';
      sessionStorage.removeItem('adminLastTab');
      window.location.href = `/admin-dashboard.html?tab=${encodeURIComponent(lastTab)}`;
    };

    document.getElementById('logoutBtn').onclick = async () => {
      await requestJSON('/auth/logout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
      window.location.href = '/auth/login';
    };

    if (!initialized) {
      initialized = true;
      loadComplaint();
    }
  </script>
</body>
</html>
