<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Авторизация</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">
  <div class="card">
    <h1>Авторизация</h1>
    <form id="loginForm">
      <label>Логин
        <input type="text" name="login" required placeholder="например: ivanov_01" />
        <div class="hint">Логин от 3 до 30 символов — буквы, цифры или _</div>
      </label>
      <label>Пароль
        <input type="password" name="password" required placeholder="минимум 6 символов" />
        <div class="hint">Используйте надёжный пароль — минимум 6 символов</div>
      </label>
      <button type="submit" class="btn btn-primary hover-highlight">
        Войти
      </button>
    </form>

    <!-- Регистрация теперь доступна только в админ-панели -->
  </div>
  <script src="/js/main.js"></script>
</body>
</html>
