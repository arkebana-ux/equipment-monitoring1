<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Авторизация</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">
  <div class="card">
    <h1>Авторизация</h1>
    <form id="loginForm">
      <label>Логин
        <input type="text" name="login" required />
      </label>
      <label>Пароль
        <input type="password" name="password" required />
      </label>
      <button type="submit" class="btn btn-primary hover-highlight">
        Войти
      </button>
    </form>

    <h2>Регистрация (для теста)</h2>
    <form id="registerForm">
      <label>ФИО
        <input type="text" name="full_name" required />
      </label>
      <label>Логин
        <input type="text" name="login" required />
      </label>
      <label>Пароль
        <input type="password" name="password" required />
      </label>
      <label>Роль
        <select name="role">
          <option value="teacher">Преподаватель</option>
          <option value="admin">Администратор</option>
        </select>
      </label>
      <button type="submit" class="btn hover-highlight">Зарегистрировать</button>
    </form>
  </div>
  <script src="/js/main.js"></script>
</body>
</html>
