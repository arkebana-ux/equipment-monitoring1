<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Аудитория</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="/" class="back-link">← Назад к списку аудиторий</a>
      <h1 id="userRoomTitle">Аудитория</h1>
    </div>
    <button id="logoutBtn" class="btn">Выйти</button>
  </header>

  <main class="tabs-container">
    <div class="room-layout">
      <!-- Левая колонка: оборудование (только просмотр, выбор строки) -->
      <section class="card wide">
        <h2>Оборудование аудитории</h2>
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Название</th>
              <th>Номер</th>
              <th>Дата покупки</th>
              <th>Статус</th>
            </tr>
          </thead>
          <tbody id="userEquipmentTableBody"></tbody>
        </table>
        <p class="hint">Выберите оборудование, по которому хотите отправить сообщение об ошибке.</p>
      </section>

      <!-- Правая колонка: форма отправки жалобы -->
      <section class="card wide">
        <h2>Сообщить об ошибке</h2>
        <form id="complaintForm" enctype="multipart/form-data">
          <input type="hidden" name="room_id" id="complaintRoomId" />
          <input type="hidden" name="equipment_id" id="complaintEquipmentId" />

          <label>
            Оборудование
            <input type="text" id="complaintEquipmentName" readonly placeholder="Выберите оборудование в таблице слева" />
            <div class="hint">Поля заполняются при выборе оборудования</div>
          </label>

          <label>
            Опишите проблему
            <textarea name="description" required placeholder="Коротко опишите неисправность, например: не включается или отсутствует изображение"></textarea>
            <div class="hint">Опишите, что именно не работает и когда заметили проблему</div>
          </label>

          <label>
            Прикрепите фото/видео
            <input type="file" name="attachments" multiple />
            <div class="hint">Можно прикрепить фото/видео — поможет администратору</div>
          </label>

          <button class="btn hover-highlight" type="submit">Отправить</button>
        </form>
      </section>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/main.js"></script>
</body>
</html>
